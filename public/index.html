<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CloudLink</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <!-- 1. Background Layer (Subtle Mesh) -->
    <div id="bg-layer"></div>

    <!-- 2. Dynamic Island (Upload Progress) -->
    <div id="dynamic-island-container">
        <div id="upload-queue" class="upload-queue"></div>
    </div>

    <!-- 3. UI Layer -->
    <div id="ui-layer">
        <!-- Top Bar -->
        <header class="top-bar">
            <button id="theme-btn" class="glass-btn icon-btn" aria-label="Toggle Theme">
                <div class="icon-container">
                    <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                    <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </div>
            </button>
            
            <div class="logo">CloudLink</div>

            <button id="auth-btn" class="glass-btn icon-btn" aria-label="Admin Access">
                <svg class="lock-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <svg class="unlock-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
            </button>
        </header>

        <!-- Main Content (File Grid) -->
        <main id="main-stage">
            <div id="file-grid" class="file-grid">
                <div class="empty-state">
                    <div class="empty-icon">📂</div>
                    <p>No files yet</p>
                </div>
            </div>
        </main>

        <!-- Bottom Liquid Dock -->
        <nav id="liquid-dock">
            <div class="dock-container">
                <button id="upload-trigger" class="liquid-btn main-action">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                </button>
            </div>
        </nav>
    </div>

    <!-- Hidden File Input for Upload -->
    <input type="file" id="file-input" webkitdirectory directory multiple hidden>

    <!-- 4. Overlay Layer (Modals & Panels) -->
    <div id="overlay-layer">
        <!-- Login Modal -->
        <div id="login-modal" class="glass-panel modal hidden">
            <h3>Admin Access</h3>
            <p>Please log in to manage files.</p>
            <form id="login-form">
                <input type="password" id="admin-password" placeholder="Password" class="glass-input" autocomplete="current-password">
                <button type="submit" class="glass-btn primary">Unlock</button>
            </form>
            <button id="loginCloseBtn" class="close-btn" style="position: absolute; top: 12px; right: 12px;">×</button>
        </div>

        <!-- Generic Password Modal -->
        <div id="passwordModal" class="glass-panel modal hidden">
            <h3>Authentication Required</h3>
            <p>Please enter the upload password.</p>
            <input type="password" id="modalPasswordInput" class="glass-input" placeholder="Password">
            <div class="modal-actions">
                <button id="modalCancelBtn" class="glass-btn">Cancel</button>
                <button id="modalConfirmBtn" class="glass-btn primary">Confirm</button>
            </div>
        </div>

        <!-- Generic Confirm Modal -->
        <div id="confirmModal" class="glass-panel modal hidden">
            <h3>Confirmation</h3>
            <p id="confirmMessage">Are you sure?</p>
            <div class="modal-actions">
                <button id="confirmCancelBtn" class="glass-btn">No</button>
                <button id="confirmOkBtn" class="glass-btn primary">Yes</button>
            </div>
        </div>

        <!-- Rename Modal -->
        <div id="renameModal" class="glass-panel modal hidden">
            <h3>Rename File</h3>
            <input type="text" id="renameInput" class="glass-input" placeholder="New file name">
            <div class="modal-actions">
                <button id="renameCancelBtn" class="glass-btn">Cancel</button>
                <button id="renameConfirmBtn" class="glass-btn primary">Save</button>
            </div>
        </div>

        <!-- Preview Modal (Bottom Sheet for now) -->
        <div id="previewModal" class="glass-panel bottom-sheet hidden">
            <div class="panel-header">
                <h3 id="previewTitle">Preview</h3>
                <button class="close-btn" id="previewCloseBtn">×</button>
            </div>
            <div id="previewContent" style="flex: 1; overflow: auto; display: flex; align-items: center; justify-content: center;"></div>
            <div class="modal-actions" style="margin-top: 16px;">
                <button id="previewDownloadBtn" class="glass-btn primary">Download</button>
                <button id="previewCopyLinkBtn" class="glass-btn">Copy Link</button>
            </div>
        </div>
    </div>

    <!-- Drag Overlay -->
    <div id="drag-overlay" class="hidden">
        <div class="drag-message">Drop to Upload</div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <script type="module" src="/js/app.js"></script>
</body>
</html>
